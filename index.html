<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmetics Dashboard</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #1abc9c;
            --accent-light: #e8f8f5;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #333333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        header h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 5px;
        }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        .tab-btn {
            padding: 10px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            background-color: #e0e0e0;
            color: #555;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background-color: var(--accent);
            color: white;
            box-shadow: 0 4px 10px rgba(26, 188, 156, 0.3);
        }
        .search-bar {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 25px;
            outline: none;
            display: block;
            margin: 0 auto 30px auto;
            transition: border-color 0.3s;
        }
        .search-bar:focus {
            border-color: var(--accent);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 25px;
            transition: transform 0.2s, box-shadow 0.2s;
            border-top: 5px solid var(--accent);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        .image-container {
            width: 100%;
            height: 240px;
            background-color: #ffffff;
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            border: 1px solid #e2e8f0;
        }
        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            padding: 10px;
            transition: transform 0.3s;
        }
        .image-container:hover img {
            transform: scale(1.05);
        }
        .image-fallback {
            color: #94a3b8;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .zoom-badge {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.72rem;
            letter-spacing: 0.5px;
        }
        .card-header {
            margin-bottom: 15px;
        }
        .brand {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #7f8c8d;
            font-weight: bold;
        }
        .product-name {
            font-size: 1.3rem;
            color: var(--primary);
            margin: 5px 0;
            font-weight: 700;
            line-height: 1.3;
        }
        .badge-container {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.78rem;
            font-weight: bold;
        }
        .badge-owner { background: var(--accent-light); color: var(--accent); }
        .badge-area { background: #eef2f3; color: #7f8c8d; text-transform: uppercase; }
        
        .info-row {
            font-size: 0.9rem;
            margin: 8px 0;
            line-height: 1.4;
        }
        .info-label {
            font-weight: bold;
            color: #555;
        }
        .ingredients-box {
            background: #fdfefe;
            border: 1px solid #eef2f3;
            padding: 10px;
            border-radius: 6px;
            max-height: 100px;
            overflow-y: auto;
            font-size: 0.8rem;
            color: #666;
            margin-top: 10px;
        }
        .footer-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-top: 1px solid #f1f1f1;
            padding-top: 15px;
            margin-top: 15px;
            font-size: 0.85rem;
            color: #95a5a6;
            line-height: 1.4;
        }
        .price {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--primary);
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Cosmetic Shelf</h1>
        <p>나(Me)와 니농(Ninon)의 화장품 통합 관리 보관함</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('all')">전체보기</button>
        <button class="tab-btn" onclick="switchTab('me')">나 (Me)</button>
        <button class="tab-btn" onclick="switchTab('ninon')">니농 (Ninon)</button>
    </div>

    <input type="text" id="search" class="search-bar" placeholder="브랜드, 제품명, 사용 부위 등으로 검색...">

    <div class="grid" id="cardGrid"></div>
</div>

<script>
    let currentTab = 'all';
    let database = [];

    async function loadDatabase() {
        try {
            // 캐시 방지를 위해 타임스탬프를 덧붙여 json을 강제 신규 로드합니다.
            const response = await fetch('cosmetics.json?v=' + new Date().getTime());
            database = await response.json();
            renderCards();
        } catch (error) {
            console.error("데이터베이스 로드 실패", error);
            document.getElementById('cardGrid').innerHTML = '<p style="text-align:center; width:100%;">cosmetics.json 로드 오류</p>';
        }
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');
        renderCards();
    }

    function openOriginalImage(imgUrl) {
        if(imgUrl) {
            let targetUrl = imgUrl;
            if(imgUrl.includes('raw.githubusercontent.com')) {
                targetUrl = imgUrl.replace('raw.githubusercontent.com', 'github.com').replace('/main/', '/blob/main/');
            }
            window.open(targetUrl, '_blank');
        }
    }

    function renderCards() {
        const query = document.getElementById('search').value.toLowerCase().trim();
        const grid = document.getElementById('cardGrid');
        grid.innerHTML = '';

        const filtered = database.filter(item => {
            // 1. 탭 소유자 필터링 (common 조건 포함)
            if (currentTab !== 'all') {
                if (item.owner !== 'common' && item.owner !== currentTab) return false;
            }
            
            // 2. 검색어 와일드카드 필터링 (국문/영문 다중 매핑 조건 강화)
            const brand = (item.brand || '').toLowerCase();
            const name = (item.name || '').toLowerCase();
            const category = (item.category || '').toLowerCase();
            const area = (item.target_area || '').toLowerCase();
            const effects = (item.effects || '').toLowerCase();
            const ingKo = (item.ingredients_ko || '').toLowerCase();
            const ingEn = (item.ingredients_en || '').toLowerCase();

            return (
                brand.includes(query) ||
                name.includes(query) ||
                category.includes(query) ||
                area.includes(query) ||
                effects.includes(query) ||
                ingKo.includes(query) ||
                ingEn.includes(query)
            );
        });

        if (filtered.length === 0) {
            grid.innerHTML = '<p style="text-align:center; width:100%; color: #95a5a6;">제품이 없습니다.</p>';
            return;
        }

        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            
            let ownerLabel = "공용 (Common)";
            let themeColor = "#34495e";
            if (item.owner === 'me') { ownerLabel = "나 (Me)"; themeColor = "#1abc9c"; }
            if (item.owner === 'ninon') { ownerLabel = "니농 (Ninon)"; themeColor = "#9b59b6"; }

            card.style.borderTopColor = themeColor;
            
            const imageUrl = item.image ? item.image : '';
            const imageSection = imageUrl 
                ? `<div class="image-container" onclick="openOriginalImage('${imageUrl}')">
                    <img src="${imageUrl}" alt="${item.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="image-fallback" style="display:none;">🖼️ 이미지 경로 로드 대기 중</div>
                    <div class="zoom-badge">원본 보기 🔍</div>
                   </div>`
                : `<div class="image-container">
                    <div class="image-fallback">📸 제품 실물 이미지 업데이트 예정</div>
                   </div>`;

            card.innerHTML = `
                ${imageSection}
                <div>
                    <div class="card-header">
                        <span class="brand">${item.brand}</span>
                        <h2 class="product-name">${item.name}</h2>
                        <div class="badge-container">
                            <span class="badge badge-owner" style="background-color: ${themeColor}15; color: ${themeColor};">${ownerLabel}</span>
                            <span class="badge badge-area">📍 ${item.target_area}</span>
                        </div>
                    </div>
                    <div class="info-row"><span class="info-label">분류:</span> ${item.category}</div>
                    <div class="info-row"><span class="info-label">용량:</span> ${item.size}</div>
                    <div class="info-row"><span class="info-label">사용기한:</span> ${item.expiry_date}</div>
                    <div class="info-row"><span class="info-label">주요 효능:</span> ${item.effects}</div>
                    <div class="ingredients-box">
                        <strong>전성분:</strong><br>${item.ingredients_ko}
                    </div>
                </div>
                <div class="footer-info">
                    <div>
                        <span>구매: ${item.purchase_date}</span><br>
                        <span>장소: ${item.location}</span>
                    </div>
                    <span class="price">${item.price}</span>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    document.getElementById('search').addEventListener('input', renderCards);
    window.onload = loadDatabase;
</script>

</body>
</html>
