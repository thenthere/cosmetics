<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmetics Dashboard</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #1abc9c;
            --accent-light: #e8f8f5;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #333333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        header h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 5px;
        }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        .tab-btn {
            padding: 10px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            background-color: #e0e0e0;
            color: #555;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background-color: var(--accent);
            color: white;
            box-shadow: 0 4px 10px rgba(26, 188, 156, 0.3);
        }
        .search-bar {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 25px;
            outline: none;
            display: block;
            margin: 0 auto 30px auto;
            transition: border-color 0.3s;
        }
        .search-bar:focus {
            border-color: var(--accent);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 25px;
            transition: transform 0.2s, box-shadow 0.2s;
            border-top: 5px solid var(--accent);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        .card-header {
            margin-bottom: 15px;
        }
        .brand {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #7f8c8d;
            font-weight: bold;
        }
        .product-name {
            font-size: 1.3rem;
            color: var(--primary);
            margin: 5px 0;
            font-weight: 700;
            line-height: 1.3;
        }
        .category {
            display: inline-block;
            background: var(--accent-light);
            color: var(--accent);
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 5px;
        }
        .info-row {
            font-size: 0.9rem;
            margin: 8px 0;
            line-height: 1.4;
        }
        .info-label {
            font-weight: bold;
            color: #555;
        }
        .ingredients-box {
            background: #fdfefe;
            border: 1px solid #eef2f3;
            padding: 10px;
            border-radius: 6px;
            max-height: 100px;
            overflow-y: auto;
            font-size: 0.8rem;
            color: #666;
            margin-top: 10px;
        }
        .footer-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-top: 1px solid #f1f1f1;
            padding-top: 15px;
            margin-top: 15px;
            font-size: 0.85rem;
            color: #95a5a6;
            line-height: 1.4;
        }
        .price {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--primary);
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Cosmetic Shelf</h1>
        <p>나(Me)와 니논(Ninon)의 화장품 통합 관리 보관함</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('all')">전체보기</button>
        <button class="tab-btn" onclick="switchTab('me')">나 (Me)</button>
        <button class="tab-btn" onclick="switchTab('ninon')">니논 (Ninon)</button>
    </div>

    <input type="text" id="search" class="search-bar" placeholder="브랜드, 제품명, 효능 등으로 검색...">

    <div class="grid" id="cardGrid"></div>
</div>

<script>
    let currentTab = 'all';
    let database = [];

    // JSON 데이터 가져오기
    async function loadDatabase() {
        try {
            const response = await fetch('cosmetics.json');
            database = await response.json();
            renderCards();
        } catch (error) {
            console.error("데이터베이스를 불러오는 데 실패했습니다.", error);
            // 가시적인 에러 메시지 처리
            document.getElementById('cardGrid').innerHTML = '<p style="text-align:center; width:100%;">cosmetics.json 파일을 로드할 수 없습니다. 파일을 같은 경로에 추가해 주세요.</p>';
        }
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');
        renderCards();
    }

    function renderCards() {
        const query = document.getElementById('search').value.toLowerCase();
        const grid = document.getElementById('cardGrid');
        grid.innerHTML = '';

        const filtered = database.filter(item => {
            // 탭 필터링
            if (currentTab !== 'all' && item.owner !== currentTab) return false;
            // 검색어 필터링
            return (
                item.brand.toLowerCase().includes(query) ||
                item.name.toLowerCase().includes(query) ||
                item.category.toLowerCase().includes(query) ||
                item.effects.toLowerCase().includes(query) ||
                item.ingredients_ko.toLowerCase().includes(query)
            );
        });

        if (filtered.length === 0) {
            grid.innerHTML = '<p style="text-align:center; width:100%; color: #95a5a6;">등록된 제품이 없습니다.</p>';
            return;
        }

        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.borderTopColor = item.owner === 'me' ? '#1abc9c' : '#9b59b6'; // 소유자별 포인트 컬러 다르게
            card.innerHTML = `
                <div>
                    <div class="card-header">
                        <span class="brand">${item.brand}</span>
                        <h2 class="product-name">${item.name}</h2>
                        <span class="category" style="background-color: ${item.owner === 'me' ? '#e8f8f5' : '#f5eef8'}; color: ${item.owner === 'me' ? '#1abc9c' : '#9b59b6'};">
                            ${item.category} (${item.owner === 'me' ? 'Me' : 'Ninon'})
                        </span>
                    </div>
                    <div class="info-row"><span class="info-label">용량:</span> ${item.size}</div>
                    <div class="info-row"><span class="info-label">사용기한:</span> ${item.expiry_date}</div>
                    <div class="info-row"><span class="info-label">효능:</span> ${item.effects}</div>
                    <div class="ingredients-box">
                        <strong>전성분:</strong><br>${item.ingredients_ko}
                    </div>
                </div>
                <div class="footer-info">
                    <div>
                        <span>구매: ${item.purchase_date}</span><br>
                        <span>장소: ${item.location}</span>
                    </div>
                    <span class="price">${item.price}</span>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    document.getElementById('search').addEventListener('input', renderCards);

    // 최초 로드 실행
    window.onload = loadDatabase;
</script>

</body>
</html>
